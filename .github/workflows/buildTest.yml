# =============================================================================
# Build Test — validate the COMPILED, PUBLISHED module
# =============================================================================
#
# After "Build and Release" succeeds, this workflow installs the freshly
# published module from this repository's own GitHub Packages feed and runs the
# black-box Pester suite in buildTest/ against it. This gives confidence that the
# module ModuleForge produced actually works once installed — every exported
# command, the alias, the validation class, the enum, and resource-file access.
#
# NO ModuleForge dependency: GitHub Packages lowercases the package id, so the
# install folder ('astrocmdlets') won't match the manifest casing and breaks
# Import-Module by name on case-sensitive Linux. That is fixed by an inline copy
# of Resolve-MFModuleCase (see psgalleryRelease_NoModuleForge.yml in the
# ModuleForge repo). Because the module under test is in THIS repository's
# package feed, the default GITHUB_TOKEN can read it — no PAT, no package-access
# grant required.
# =============================================================================

name: Build Test

on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed
  workflow_dispatch:

jobs:
  buildTest:
    # Auto-run only when the upstream build succeeded; always run on manual dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout + gh release list
      packages: read   # read this repo's GitHub Packages NuGet feed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          $VerbosePreference = 'Continue'
          Install-Module -Name Pester -Force -SkipPublisherCheck
          Install-Module -Name Microsoft.PowerShell.PSResourceGet -Force -SkipPublisherCheck
          Import-Module Microsoft.PowerShell.PSResourceGet
          Get-Module Pester,Microsoft.PowerShell.PSResourceGet |
            Select-Object Name,Version | Format-Table

      - name: Register GitHub Packages repository
        shell: pwsh
        if: success()
        run: |
          $VerbosePreference = 'Continue'
          $repoUrl = "https://nuget.pkg.github.com/$($env:GITHUB_REPOSITORY_OWNER)/index.json"
          Write-Verbose "GitHub Packages feed: $repoUrl"
          Register-PSResourceRepository -Name 'myGHPackages' -Uri $repoUrl -Trusted
          Get-PSResourceRepository | Select-Object Name,Uri,Trusted | Format-List

      - name: Install published module and run build tests
        shell: pwsh
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $VerbosePreference = 'Continue'

          # --- Inline module-case fix (no ModuleForge dependency) ------------------
          # Verbatim copy of Resolve-MFModuleCase from the ModuleForge repo's
          # psgalleryRelease_NoModuleForge.yml. GitHub Packages lowercases the package
          # id, so the installed folder casing won't match the manifest; this renames
          # the folder to the manifest base name so Import-Module by name works on Linux.
          function Resolve-MFModuleCase
          {
              [CmdletBinding()]
              [OutputType([PSCustomObject])]
              PARAM(
                  [Parameter(Mandatory,ValueFromPipeline,ValueFromPipelineByPropertyName)]
                  [string]$ModuleName,
                  [Parameter()]
                  [string[]]$ModuleFolder
              )
              begin{
                  $folderVersionSelect = @(
                      'FullName'
                      'Name'
                      @{
                          Name = 'Semver'
                          Expression = {
                              try {
                                  [semver]"$($_.Name)"
                              }catch {
                                  $null
                              }
                          }
                      }
                  )
              }
              process{
                  $moduleCandidates = [System.Collections.Generic.List[string]]::new()
                  if($ModuleFolder)
                  {
                      write-verbose "Checking defined folder: $ModuleFolder"
                      $foundItems = Get-ChildItem -Path $ModuleFolder -Recurse -Filter $ModuleName -Directory
                      $foundItems.foreach{
                          $moduleCandidates.Add($_.FullName)
                      }
                  }else{
                      $locations = $env:PSModulePath -split [IO.Path]::PathSeparator
                      $locations.Foreach{
                          try{
                              $foundItems = Get-ChildItem -Path $_ -Recurse -Filter $ModuleName -Directory -ErrorAction Ignore
                              $foundItems.foreach{
                                  $moduleCandidates.Add($_.FullName)
                              }
                          }catch{
                              Write-Warning "Skipping path $_ due to read or permission errors"
                          }
                      }
                  }
                  $moduleCandidates = $moduleCandidates.ToArray()
                  Write-Verbose "Found $($moduleCandidates.count) locations."
                  if(!$moduleCandidates -or $moduleCandidates.Count -lt 1)
                  {
                      Write-Warning "No module folders found for module: $ModuleName"
                  }
                  $moduleCandidates.forEach{
                      $moduleFolderBasename = $(Get-Item $_).BaseName
                      Remove-Variable latestVersion,modManifest,BaseFolderRefresh -ErrorAction Ignore
                      Write-Verbose "Checking folder $_ for latest module version"
                      $latestVersion = $(Get-ChildItem -path $_|Select-Object $folderVersionSelect).where{$_.Semver}|Sort-Object -Property Semver -Descending|Select-Object -First 1
                      if($latestVersion)
                      {
                          Write-Verbose "Found latest version of: $($latestVersion.Name)"
                          $modManifest = $(Get-ChildItem -Path $latestVersion.FullName).where{$_.name -eq  "$ModuleName.psd1"}|Select-Object -first 1
                          Write-Verbose "Found Manifest name with: $($modManifest.basename)"
                          If($(Get-Item $_).BaseName -cne $modManifest.basename)
                          {
                              Write-Warning "Case mismatch between module folder $moduleFolderBasename and $($modManifest.basename)"
                              write-verbose "Attempt to rename folder to manifest basename to correct for casing"
                              try{
                                  Rename-Item -path $_ -NewName $modManifest.BaseName -Force -Erroraction Stop
                                  Start-Sleep -Seconds 4
                                  Write-Verbose 'Folder Rename attempted'
                              }catch{
                                  write-warning 'Error renaming folder'
                              }
                              $Parent = Split-Path $_ -Parent
                              $NewFullPath = Join-Path $Parent $modManifest.BaseName
                              try{
                                  $BaseFolderRefresh = Get-Item $NewFullPath
                              }catch{
                                  $BaseFolderRefresh = Get-Item $_
                              }
                              [PSCustomObject]@{
                                  FolderFullName = $BaseFolderRefresh.FullName
                                  FolderBaseName = $BaseFolderRefresh.BaseName
                                  ManifestName = $modManifest.BaseName
                                  RenameAttempt = $true
                                  ManifestAndFolderMatch = if($BaseFolderRefresh.BaseName -ceq $modManifest.BaseName){$true}else{$false}
                              }
                          }else{
                              Write-Verbose "Case match between module folder $moduleFolderBasename and $($modManifest.basename) - All Ok"
                              [PSCustomObject]@{
                                  FolderFullName = $_
                                  FolderBaseName = $moduleFolderBasename
                                  ManifestName = $modManifest.BaseName
                                  RenameAttempt = $false
                                  ManifestAndFolderMatch = if($moduleFolderBasename -ceq $modManifest.BaseName){$true}else{$false}
                              }
                          }
                          Write-Verbose "Finished checking folder $_"
                      }else{
                          Write-Warning "No module versions found for $modulename in folder $_"
                      }
                  }
              }
          }
          # -------------------------------------------------------------------------

          $credential = New-Object System.Management.Automation.PSCredential(
            'githubActions',
            (ConvertTo-SecureString $env:GH_TOKEN -AsPlainText -Force)
          )

          if(-not (Test-Path ./moduleForgeConfig.xml)){
            throw 'Unable to read moduleForgeConfig.xml'
          }
          $moduleName = (Import-Clixml ./moduleForgeConfig.xml).moduleName
          Write-Verbose "Module under test: $moduleName"

          # Resolve the latest release (including prereleases) from this repo
          $releases = gh release list --limit 1 --json tagName,isPrerelease | ConvertFrom-Json -ErrorAction Stop
          $latest   = $releases | Select-Object -First 1
          if(-not $latest){ throw 'No releases found to test' }
          $version  = $latest.tagName.TrimStart('v')
          $semver   = [semver]::New($version)
          Write-Verbose "Latest release: $($latest.tagName) (prerelease: $($latest.isPrerelease)) -> version $semver"

          # GitHub Packages can lag a few seconds behind the publish step — retry the lookup
          $selectedRelease = $null
          for($attempt = 1; $attempt -le 6 -and -not $selectedRelease; $attempt++){
            Write-Verbose "Find attempt $attempt for $moduleName $semver"
            $selectedRelease = Find-PSResource -Repository myGHPackages -Name $moduleName -Version $semver `
              -Credential $credential -Prerelease -ErrorAction SilentlyContinue
            if(-not $selectedRelease){ Start-Sleep -Seconds 10 }
          }
          if(-not $selectedRelease){ throw "Module $moduleName $semver not found on GitHub Packages" }
          $selectedRelease | Install-PSResource -Credential $credential

          # The "name fix" — correct module folder casing for case-sensitive Linux imports
          Write-Verbose 'Resolving module case'
          Resolve-MFModuleCase -ModuleName $moduleName
          $moduleFound = $(Get-Module -ListAvailable).where{ $_.Name -ieq $moduleName }
          if(-not $moduleFound){ throw "Module $moduleName not found after install — case resolution may have failed" }
          Write-Verbose "Installed at: $($moduleFound.ModuleBase)"

          # Run the black-box build test suite against the installed module
          $config = New-PesterConfiguration
          $config.Run.Path        = './buildTest'
          $config.Run.PassThru    = $true
          $config.Output.Verbosity = 'Detailed'
          $result = Invoke-Pester -Configuration $config

          if($result.FailedCount -gt 0){
            throw "buildTest: $($result.FailedCount) test(s) failed against the published module"
          }
          Write-Host "✅ buildTest passed: $($result.PassedCount) test(s) against $moduleName $semver"
